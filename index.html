<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Produtos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-6">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
      Cadastro de Produtos
    </h1>

    <div class="space-y-4">
      <div>
        <label for="produto" class="block text-sm font-semibold text-gray-700 mb-1">
          Produto
        </label>
        <input
          id="produto"
          type="text"
          placeholder="Digite o produto"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label for="quantidade" class="block text-sm font-semibold text-gray-700 mb-1">
          Quantidade
        </label>
        <input
          id="quantidade"
          type="number"
          placeholder="Digite a quantidade"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        id="processar"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition"
      >
        Processar
      </button>
    </div>

    <div class="mt-8">
      <h2 class="text-lg font-bold text-gray-800 mb-3">Lista de Produtos</h2>

      <div id="lista" class="space-y-3"></div>
    </div>
  </div>

</body>
</html>
